<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4: JavaScript validation</title>

    <style>
        /*  css only for errors */
        .error-message {
            color: red;
            font-size: 14px;
        }

        .invalid-field {
            border: 2px solid red;
        }
    </style>

</head>

<body>

    <div class="lab-card">

        <div class="form-container">
            <form class="signup-form" id="signupForm" novalidate>

                <div class="form-row">
                    <label>Name:</label>
                    <div class="field-group">
                        <input type="text" id="name" placeholder="Syed Muhammad Uzair">
                        <div class="error-message" id="nameError"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Gender:</label>
                    <div class="field-group">
                        <div class="inline-radio-group">
                            <div><input type="radio" name="gender" value="Male" id="male"> <label
                                    for="male">Male</label></div>
                            <div><input type="radio" name="gender" value="Female" id="female"> <label
                                    for="female">Female</label></div>
                            </div>
                        <div class="error-message" id="genderError"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Email:</label>
                    <div class="field-group">
                        <input type="email" id="email" placeholder="student@uetmardan.edu.pk">
                        <div class="error-message" id="emailError"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Address:</label>
                    <div class="field-group">
                        <textarea id="address" placeholder="Hostel / city / street ..."></textarea>
                        <div class="error-message" id="addressError"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Login ID:</label>
                    <div class="field-group">
                        <input type="text" id="loginId" placeholder="Choose a username">
                        <div class="error-message" id="loginIdError"></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Password:</label>
                    <div class="field-group">
                        <input type="password" id="password" placeholder="at least 6 characters">
                        <div class="error-message" id="passwordError"></div>
                    </div>
                </div>

                <div class="checkbox-row">
                    <label style="width:110px;">Agreed with Policy:</label>
                    <input type="checkbox" id="agreePolicy">
                    <span style="margin-left:8px;">I accept the terms</span>
                </div>

                <div style="margin-left:110px;" class="error-message" id="agreeError"></div>

                <div class="action-buttons">
                    <button type="button" id="submitBtn">Submit</button>
                    <button type="button" id="resetBtn">Reset</button>
                </div>

            </form>
        </div>

    </div>

    <script>

        (function () {

            const nameField = document.getElementById('name');
            const maleRadio = document.getElementById('male');
            const femaleRadio = document.getElementById('female');
            const otherRadio = document.getElementById('other');
            const emailField = document.getElementById('email');
            const addressField = document.getElementById('address');
            const loginField = document.getElementById('loginId');
            const passwordField = document.getElementById('password');
            const agreeCheck = document.getElementById('agreePolicy');

            const nameErr = document.getElementById('nameError');
            const genderErr = document.getElementById('genderError');
            const emailErr = document.getElementById('emailError');
            const addressErr = document.getElementById('addressError');
            const loginErr = document.getElementById('loginIdError');
            const passwordErr = document.getElementById('passwordError');
            const agreeErr = document.getElementById('agreeError');

            function clearErrors() {
                [nameErr, genderErr, emailErr, addressErr, loginErr, passwordErr, agreeErr]
                    .forEach(e => e.innerText = '');

                [nameField, emailField, addressField, loginField, passwordField, agreeCheck]
                    .forEach(f => f.classList.remove('invalid-field'));
            }

            function validate() {

                let valid = true;

                if (!nameField.value.trim()) {
                    nameErr.innerText = "Name required";
                    nameField.classList.add("invalid-field");
                    valid = false;
                }

                if (!maleRadio.checked && !femaleRadio.checked && !otherRadio.checked) {
                    genderErr.innerText = "Select gender";
                    valid = false;
                }

                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (!emailField.value.trim()) {
                    emailErr.innerText = "Email required";
                    emailField.classList.add("invalid-field");
                    valid = false;
                }
                else if (!emailPattern.test(emailField.value)) {
                    emailErr.innerText = "Invalid email";
                    emailField.classList.add("invalid-field");
                    valid = false;
                }

                if (!loginField.value.trim()) {
                    loginErr.innerText = "Login ID required";
                    loginField.classList.add("invalid-field");
                    valid = false;
                }

                if (passwordField.value.length < 6) {
                    passwordErr.innerText = "Min 6 characters";
                    passwordField.classList.add("invalid-field");
                    valid = false;
                }

                if (!agreeCheck.checked) {
                    agreeErr.innerText = "Accept policy";
                    agreeCheck.classList.add("invalid-field");
                    valid = false;
                }

                return valid;

            }

            document.getElementById("submitBtn").onclick = function () {

                clearErrors();

                if (validate()) {
                    alert("Form valid");
                }

            };

            document.getElementById("resetBtn").onclick = function () {

                document.getElementById("signupForm").reset();
                clearErrors();

            };

        })();

    </script>

</body>

</html>
